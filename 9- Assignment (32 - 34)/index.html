<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment( 31:34 )</title>
    <style>
        fieldset {
            width: 400px;
            margin: 50px auto;
        }
        form {
            margin: 20px;
        }
    </style>
</head>
<body>
    <fieldset>
        <form action="" target="_blank" novalidate>
            <div>
                <label for="search">Search</label>
                <br>
                <input type="search" id="search" placeholder="Enter A Search Word" autofocus>
            </div>
            <br><br>
            <div>
                <label for="file">Upload</label>
                <br>
                <input type="file" id="file">
            </div>
            <br>
            <div>
                <label for="url">Url</label>
                <br>
                <input type="url" id="url" required>
            </div>
            <br>
            <input type="reset" value="Empty">
            <input type="submit" value="Save">
        </form>
    </fieldset>
    <br>
    <!-- separator -->
    <hr>
    <fieldset>
        <form action="">
            <label>Date</label>
            <input type="date" value="1982-10-25">
            <br><br>
            <label for="month">Month</label>
            <input type="month" name="month" id="month" value="1982-10">
            <br><br>
            
            <label for="time">Time</label>
            <input type="time" name="time" id="time" value="15:00">
            <br><br>
            <label for="datetime">datetime</label>
            <input type="datetime-local" name="datetime-local" id="datetime" value="1982-08-10T15:00">
            <br><br>
            <input type="reset" value="Empty">
            <input type="submit" value="Save">
        </form>
        </form>
    </fieldset>
</body>
</html>
